<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JobTrack Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Dashboard -->
  <section class="p-6">
    <h1 class="text-3xl font-bold mb-6">JobTrack Dashboard</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-white p-5 rounded-xl shadow">
        <h2 class="text-lg font-semibold">All Jobs</h2>
        <p id="allCount" class="text-2xl font-bold mt-2">0</p>
      </div>

      <div class="bg-white p-5 rounded-xl shadow">
        <h2 class="text-lg font-semibold">Interview</h2>
        <p id="interviewCount" class="text-2xl font-bold mt-2">0</p>
      </div>

      <div class="bg-white p-5 rounded-xl shadow">
        <h2 class="text-lg font-semibold">Rejected</h2>
        <p id="rejectedCount" class="text-2xl font-bold mt-2">0</p>
      </div>
    </div>
  </section>

  <!-- Available Jobs Section -->
  <section class="p-6">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-2xl font-bold">Available Jobs</h2>
      <span id="sectionCount" class="font-semibold">0 Jobs</span>
    </div>

    <!-- Tabs -->
    <div class="flex gap-4 mb-6">
      <button class="tabBtn px-4 py-2 bg-blue-500 text-white rounded" data-tab="all">All</button>
      <button class="tabBtn px-4 py-2 bg-gray-300 rounded" data-tab="interview">Interview</button>
      <button class="tabBtn px-4 py-2 bg-gray-300 rounded" data-tab="rejected">Rejected</button>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center mt-10">
      <img src="https://cdn-icons-png.flaticon.com/512/4076/4076549.png"
           class="w-24 mx-auto mb-4">
      <h3 class="text-xl font-semibold">No jobs available</h3>
      <p class="text-gray-500">There are no jobs in this category.</p>
    </div>

    <!-- Cards -->

    <div id="jobContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </section>

<script src="function.js"></script>
</body>
</html>
